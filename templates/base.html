{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>PetAdopt</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8f9fa;
        }

        .hero {
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            padding: 80px 0;
            border-radius: 10px;
        }

        .card {
            border: none;
            border-radius: 12px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card img {
           height: 220px;
    object-fit: cover;
        }
    </style>

    
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'home' %}">🐾 PetAdopt</a>

    <div class="ms-auto">
      <a class="nav-link d-inline text-white" href="{% url 'home' %}">Home</a>
      <a class="nav-link d-inline text-white" href="{% url 'about' %}">About</a>
      <a class="nav-link d-inline text-white" href="{% url 'contact' %}">Contact</a>
    </div>
  </div>
</nav>

 

<div class="container mt-4">
    {% block content %}{% endblock %}
</div>



<footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">© 2026 PetAdopt 🐾 | Made with ❤️</p>
</footer>

</body>
</html>
